  <!-- ── XTT terrain texture parser ───────────────────────────────────────────
       Reads a Halo Wars .xtt file (ECF container) and decodes the DXT1 albedo
       atlas into an HTMLImageElement for use as the map background.
       Based on binary templates by kornman00 (HaloMods/HaloWarsDocs).
  ──────────────────────────────────────────────────────────────────────────── -->
  <script>
    // ── ECF container (big-endian throughout) ─────────────────────────────────
    // Header (32 bytes):
    //   u32 signature=0xDABA7737, u32 headerSize, u32 adler32, u32 fileSize,
    //   u16 numChunks, u16 flags, u32 id, u16 chunkExtraDataSize, u16 pad, u32 pad
    // Each chunk entry (24 + chunkExtraDataSize bytes):
    //   u64 id, u32 offset, u32 size, u32 adler32, u8 flags, u8 alignLog2, u16 resFlags
    // XTT chunk IDs (as 64-bit, upper 32 bits = 0):
    //   0x1111 = XTTHeader, 0x6666 = AtlasChunkAlbedo (DXT1)  ← target
    // AtlasChunkAlbedo at chunk offset: i32 memSize, i32 width, i32 height,
    //   i32 mipCount, then memSize bytes of raw D3DFMT_DXT1

    const ECF_SIG = 0xDABA7737;

    function parseECFChunks(view) {
      const sig = view.getUint32(0, false);
      if (sig !== ECF_SIG) throw new Error("Not an ECF file (bad signature 0x" + sig.toString(16).toUpperCase() + ")");
      const headerSize      = view.getUint32(4,  false);
      const numChunks       = view.getUint16(16, false);
      const chunkExtraBytes = view.getUint16(24, false);
      const chunkEntrySize  = 24 + chunkExtraBytes;
      const chunks = new Map();
      let pos = headerSize;
      for (let i = 0; i < numChunks; i++) {
        // ID is a big-endian QWORD — read as two u32s and combine as BigInt
        const idHi  = view.getUint32(pos,     false);
        const idLo  = view.getUint32(pos + 4, false);
        const id    = (BigInt(idHi) << 32n) | BigInt(idLo);
        const offset = view.getUint32(pos + 8,  false);
        const size   = view.getUint32(pos + 12, false);
        chunks.set(id, { offset, size });
        pos += chunkEntrySize;
      }
      return chunks;
    }

    function parseXTT(arrayBuffer) {
      const view   = new DataView(arrayBuffer);
      const chunks = parseECFChunks(view);

      const albedo = chunks.get(0x6666n);
      if (!albedo) throw new Error("No albedo chunk (0x6666) — wrong file or version");
      if (albedo.size < 16) throw new Error("Albedo chunk too small");

      let p          = albedo.offset;
      const memSize  = view.getInt32(p,      false); p += 4;
      const width    = view.getInt32(p,      false); p += 4;
      const height   = view.getInt32(p,      false); p += 4;
      const mipCount = view.getInt32(p,      false); p += 4;

      if (memSize <= 0 || width <= 0 || height <= 0)
        throw new Error("XTT albedo invalid dimensions: " + width + "x" + height);

      // First mip level only — DXT1 = ceil(w/4)*ceil(h/4)*8 bytes
      const dxt1Bytes = Math.ceil(width / 4) * Math.ceil(height / 4) * 8;
      if (memSize < dxt1Bytes)
        throw new Error("memSize (" + memSize + ") < expected DXT1 size (" + dxt1Bytes + ")");

      const dxt1 = new Uint8Array(arrayBuffer, p, dxt1Bytes);
      const rgba = decodeDXT1(dxt1, width, height);
      return { width, height, mipCount, rgba };
    }

    function xttToDataURL(arrayBuffer) {
      const { width, height, rgba } = parseXTT(arrayBuffer);
      // The XTT texture is stored with X as the fast axis, which comes out rotated
      // 90° CW relative to the SCN coordinate system (where X=left-right, Z=top-bottom).
      // Rotate 90° CCW: output is still square (W=height, H=width after rotation).
      const src = document.createElement("canvas");
      src.width = width; src.height = height;
      src.getContext("2d").putImageData(new ImageData(rgba, width, height), 0, 0);

      const dst = document.createElement("canvas");
      dst.width = height; dst.height = width; // swapped for 90° rotation
      const ctx = dst.getContext("2d");
      ctx.translate(0, width);
      ctx.rotate(-Math.PI / 2);
      ctx.drawImage(src, 0, 0);
      return dst.toDataURL("image/png");
    }

    // ── DXT1 (BC1) decoder ────────────────────────────────────────────────────
    // Each 8-byte 4×4 block: 2× RGB565 LE endpoints + 4 rows of 2-bit palette indices.
    // 4-color mode (c0 > c1): palette = [c0, c1, (2c0+c1)/3, (c0+2c1)/3]
    // 3-color+transparent (c0 <= c1): palette = [c0, c1, (c0+c1)/2, transparent]
    function decodeDXT1(src, width, height) {
      const dst     = new Uint8ClampedArray(width * height * 4);
      const blocksX = Math.ceil(width  / 4);
      const blocksY = Math.ceil(height / 4);
      let   base    = 0;
      for (let by = 0; by < blocksY; by++) {
        for (let bx = 0; bx < blocksX; bx++) {
          const c0raw = src[base]     | (src[base + 1] << 8);
          const c1raw = src[base + 2] | (src[base + 3] << 8);
          const r0 = (c0raw >> 11) * 255 / 31 | 0;
          const g0 = ((c0raw >> 5) & 0x3F) * 255 / 63 | 0;
          const b0 = (c0raw & 0x1F) * 255 / 31 | 0;
          const r1 = (c1raw >> 11) * 255 / 31 | 0;
          const g1 = ((c1raw >> 5) & 0x3F) * 255 / 63 | 0;
          const b1 = (c1raw & 0x1F) * 255 / 31 | 0;
          // 4-entry palette as flat RGBA array
          const pal = new Uint8Array(16);
          pal[0]=r0; pal[1]=g0; pal[2]=b0; pal[3]=255;
          pal[4]=r1; pal[5]=g1; pal[6]=b1; pal[7]=255;
          if (c0raw > c1raw) {
            pal[ 8] = (2*r0+r1)/3+.5|0; pal[ 9] = (2*g0+g1)/3+.5|0; pal[10] = (2*b0+b1)/3+.5|0; pal[11] = 255;
            pal[12] = (r0+2*r1)/3+.5|0; pal[13] = (g0+2*g1)/3+.5|0; pal[14] = (b0+2*b1)/3+.5|0; pal[15] = 255;
          } else {
            pal[ 8] = (r0+r1)/2+.5|0; pal[ 9] = (g0+g1)/2+.5|0; pal[10] = (b0+b1)/2+.5|0; pal[11] = 255;
            // index 3 = transparent (0,0,0,0) — already zero from new Uint8Array
          }
          for (let row = 0; row < 4; row++) {
            const bits = src[base + 4 + row];
            for (let col = 0; col < 4; col++) {
              const px = bx*4+col, py = by*4+row;
              if (px >= width || py >= height) continue;
              const pi = ((bits >> (col*2)) & 3) << 2;  // palette index × 4
              const di = (py*width + px) << 2;           // dst index × 4
              dst[di]=pal[pi]; dst[di+1]=pal[pi+1]; dst[di+2]=pal[pi+2]; dst[di+3]=pal[pi+3];
            }
          }
          base += 8;
        }
      }
      return dst;
    }
  </script>

  <!-- ── XTD heightmap parser ──────────────────────────────────────────────────
       Reads a Halo Wars .xtd file (ECF container) and builds a height lookup
       function: sampleHeight(worldX, worldZ) → worldY.
       Based on binary templates by kornman00 (HaloMods/HaloWarsDocs).

       Key chunks (chunk IDs are big-endian QWORDs, upper 32 bits = 0):
         0x1111 — XTDHeader: version(i32) numXVerts(i32) numXChunks(i32)
                             tileScale(f32) AABB{min.xyz max.xyz} (all big-endian)
         0x8888 — AtlasChunk: PosCompMin(XMVECTOR BE) PosCompRange(XMVECTOR BE)
                              then vertex data switches to LITTLE-endian:
                              Positions[n] Normals[n]  (each uint32, PC 10-10-10 packed)

       PC 10-10-10 position unpacking:
         x_bits = (v >> 20) & 0x3FF
         y_bits = (v >> 10) & 0x3FF
         z_bits = (v >>  0) & 0x3FF
         worldX = (x_bits / 1023) * RangeX - MinX   (MinX is typically negative)
         worldY = (y_bits / 1023) * RangeY - MinY
         worldZ = (z_bits / 1023) * RangeZ - MinZ

       Vertex grid is numXVerts × numXVerts, row-major (Z outer, X inner).
       Height sampled by bilinear interpolation within the grid cell.
  ──────────────────────────────────────────────────────────────────────────── -->
  <script>
    // Global heightmap — set when XTD is loaded, null otherwise.
    // sampleTerrainHeight(wx, wz) → Y in game units, or null if no XTD loaded.
    let g_heightmap = null;

    function sampleTerrainHeight(wx, wz) {
      if (!g_heightmap) return null;
      return g_heightmap.sample(wx, wz);
    }

    function parseXTD(arrayBuffer) {
      const view   = new DataView(arrayBuffer);
      const chunks = parseECFChunks(view); // reuses the ECF parser from XTT block

      // ── Header (chunk 0x1111) ── big-endian ──────────────────────────────────
      const hdrChunk = chunks.get(0x1111n);
      if (!hdrChunk) throw new Error("XTD: no header chunk (0x1111)");
      let p = hdrChunk.offset;

      const version   = view.getInt32(p, false); p += 4;
      if (version !== 0x000C)
        console.warn("XTD: unexpected version 0x" + version.toString(16) + " (expected 0x000C)");

      const numXVerts  = view.getInt32(p,   false); p += 4;
      const numXChunks = view.getInt32(p,   false); p += 4;
      const tileScale  = view.getFloat32(p, false); p += 4;
      // AABB World — two Vector3F (min then max), big-endian floats
      const worldMinX = view.getFloat32(p, false); p += 4;
      const worldMinY = view.getFloat32(p, false); p += 4;
      const worldMinZ = view.getFloat32(p, false); p += 4;
      const worldMaxX = view.getFloat32(p, false); p += 4;
      const worldMaxY = view.getFloat32(p, false); p += 4;
      const worldMaxZ = view.getFloat32(p, false); p += 4;

      // ── Atlas chunk (0x8888) ─────────────────────────────────────────────────
      const atlasChunk = chunks.get(0x8888n);
      if (!atlasChunk) throw new Error("XTD: no atlas chunk (0x8888)");
      p = atlasChunk.offset;

      // PosCompMin — XMVECTOR: 4 big-endian floats (x,y,z,w)
      const compMinX = view.getFloat32(p, false); p += 4;
      const compMinY = view.getFloat32(p, false); p += 4;
      const compMinZ = view.getFloat32(p, false); p += 4;
      p += 4; // w — unused

      // PosCompRange — XMVECTOR: 4 big-endian floats (x,y,z,w)
      const compRangeX = view.getFloat32(p, false); p += 4;
      const compRangeY = view.getFloat32(p, false); p += 4;
      const compRangeZ = view.getFloat32(p, false); p += 4;
      p += 4; // w — unused

      // Vertex data: little-endian uint32, PC 10-10-10 packed
      // Total data = atlasChunk.size - 32 (two XMVECTORs)
      // First half = positions, second half = normals — we only need positions
      const memSize  = atlasChunk.size - 32;
      const numVerts = (memSize / 4) / 2; // positions only

      if (numVerts !== numXVerts * numXVerts)
        console.warn("XTD: vertex count mismatch — expected " + (numXVerts*numXVerts) + " got " + numVerts);

      const MASK10  = 0x3FF;
      const RCP1023 = 1.0 / 1023.0;

      // Store just the Y (height) values — that's all we need for terrain sampling
      const heights = new Float32Array(numVerts);
      for (let i = 0; i < numVerts; i++) {
        const v     = view.getUint32(p, true); p += 4; // little-endian
        const yBits = (v >> 10) & MASK10;
        heights[i]  = (yBits * RCP1023 * compRangeY) - compMinY;
      }

      // ── Height sampler ───────────────────────────────────────────────────────
      // Grid: numXVerts × numXVerts, row-major — index = iz * numXVerts + ix
      // World extents from the AABB in the header
      const spanX = worldMaxX - worldMinX;
      const spanZ = worldMaxZ - worldMinZ;
      const gridMax = numXVerts - 1;

      function sample(wx, wz) {
        // Normalise world position to [0, gridMax]
        const tx = ((wx - worldMinX) / spanX) * gridMax;
        const tz = ((wz - worldMinZ) / spanZ) * gridMax;
        const ix = Math.max(0, Math.min(gridMax - 1, Math.floor(tx)));
        const iz = Math.max(0, Math.min(gridMax - 1, Math.floor(tz)));
        const fx = tx - ix;
        const fz = tz - iz;
        // Bilinear interpolation from 4 surrounding vertices
        const h00 = heights[ iz      * numXVerts + ix     ];
        const h10 = heights[ iz      * numXVerts + (ix+1) ];
        const h01 = heights[ (iz+1)  * numXVerts + ix     ];
        const h11 = heights[ (iz+1)  * numXVerts + (ix+1) ];
        return h00*(1-fx)*(1-fz) + h10*fx*(1-fz) + h01*(1-fx)*fz + h11*fx*fz;
      }

      return {
        numXVerts, tileScale,
        worldMinX, worldMinZ, worldMaxX, worldMaxZ,
        worldMinY, worldMaxY,
        compMinY, compRangeY,
        heights, sample,
      };
    }

    // ── Hillshade compositor ─────────────────────────────────────────────────────
    // Composites XTD-derived hillshading onto the XTT terrain texture.
    // Called automatically when both are loaded. Returns a new data URL.
    //
    // Algorithm:
    //   For each output pixel, map to the height grid, compute the surface normal
    //   from a 3×3 Sobel gradient, dot with a sun direction, then multiply the
    //   terrain texture color by the shading value.
    //
    // Sun direction: northwest at ~45° elevation (classic cartographic convention).
    // Vertical exaggeration: tunable — higher = more dramatic shadows.

    let g_xttDataURL  = null;   // raw XTT data URL, stored separately from mapImg

    const HILLSHADE_SUN = (function() {
      // Sun from NW at 45° elevation
      const raw = { x: -1, y: 2, z: -1 };
      const len = Math.sqrt(raw.x*raw.x + raw.y*raw.y + raw.z*raw.z);
      return { x: raw.x/len, y: raw.y/len, z: raw.z/len };
    })();

    function buildHillshadeDataURL(xttDataURL, heightmap) {
      // Draw XTT onto an offscreen canvas to get pixel data
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const W = img.width, H = img.height;
          const canvas = document.createElement("canvas");
          canvas.width = W; canvas.height = H;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          const imgData = ctx.getImageData(0, 0, W, H);
          const px = imgData.data;

          const { heights, numXVerts, tileScale } = heightmap;
          const gridMax = numXVerts - 1;
          // Vertical exaggeration: terrain height range vs horizontal cell size
          // tileScale is game-units per grid step; heights are also in game units.
          // A factor of 1 = physically accurate. Raise for more drama.
          const vertScale = 1.0 / (tileScale || 4.0);

          const sun = HILLSHADE_SUN;
          const ambientLight = 0.25;  // minimum brightness (0-1)

          for (let py = 0; py < H; py++) {
            for (let px2 = 0; px2 < W; px2++) {
              // Texture is rotated 90° CCW relative to height grid — swap axes
              // pixel (px2, py) in rotated texture → grid (gz, gridMax-gx) in original
              const gx = (py  / H) * gridMax;
              const gz = ((W - 1 - px2) / W) * gridMax;

              // Sobel gradient: sample 3×3 neighbourhood
              const x0 = Math.max(0, Math.floor(gx) - 1);
              const x1 = Math.min(gridMax, Math.floor(gx));
              const x2 = Math.min(gridMax, Math.ceil(gx)  + 1);
              const z0 = Math.max(0, Math.floor(gz) - 1);
              const z1 = Math.min(gridMax, Math.floor(gz));
              const z2 = Math.min(gridMax, Math.ceil(gz)  + 1);

              const h00 = heights[z0*numXVerts+x0], h10 = heights[z0*numXVerts+x1], h20 = heights[z0*numXVerts+x2];
              const h01 = heights[z1*numXVerts+x0],                                  h21 = heights[z1*numXVerts+x2];
              const h02 = heights[z2*numXVerts+x0], h12 = heights[z2*numXVerts+x1], h22 = heights[z2*numXVerts+x2];

              // Sobel X and Z derivatives (height gradient)
              const dhdx = ((-h00 + h20) + 2*(-h01 + h21) + (-h02 + h22)) * vertScale;
              const dhdz = ((-h00 - 2*h10 - h20) + (h02 + 2*h12 + h22))   * vertScale;

              // Surface normal = normalize(-dhdx, 1, -dhdz)
              const nx = -dhdx, ny = 1.0, nz = -dhdz;
              const nLen = Math.sqrt(nx*nx + ny*ny + nz*nz);

              // Lambertian shading + ambient
              const shade = ambientLight + (1 - ambientLight) * Math.max(0,
                (nx/nLen)*sun.x + (ny/nLen)*sun.y + (nz/nLen)*sun.z
              );

              // Multiply terrain texture by shade
              const i = (py * W + px2) * 4;
              px[i]   = px[i]   * shade | 0;
              px[i+1] = px[i+1] * shade | 0;
              px[i+2] = px[i+2] * shade | 0;
              // alpha unchanged
            }
          }

          ctx.putImageData(imgData, 0, 0);
          resolve(canvas.toDataURL("image/png"));
        };
        img.onerror = reject;
        img.src = xttDataURL;
      });
    }
  </script>

    // ── Classifier ────────────────────────────────────────────────────────────────
    function classifyObject(editorName, typeStr) {
      const t = (typeStr  || "").toLowerCase();
      const e = (editorName || "").toLowerCase();
      const n = t || e;  // prefer type string, fall back to editor name

      if (n.includes("game_base_socket") || n.includes("basesocket") || n.includes("base_socket")) return "basesocket";
      if (n.includes("hook_bldg_minibase") || n.includes("minibase") || n.includes("supplyhook") || n.includes("supply_hook")) return "supplyhook";
      if (n.includes("sniperplatform") || n.includes("sniper_platform") || n.includes("hook_bldg_sniper")) return "sniperplatform";
      if (n.includes("hook_bldg_turretsocket") || n.includes("turretsocket") || n.includes("turret_socket")) return "turretsocket";
      if (n.includes("hook_bonus_reactor") || n.includes("bonus_reactor")) return "bonusreactor";
      if (n.includes("hook_bonus_house") || n.includes("bonus_house")) return "bonushouse";
      if (n.includes("hook_buff_healing") || n.includes("buff_healing")) return "healingzone";
      if (n.includes("hook_bldg_megaturret") || n.includes("megaturret")) return "megaturret";
      if (n.includes("hook_bldg_wall")) return "wall";
      if (n.includes("hook_bldg_teleporter") || n.includes("teleporter")) return "teleporter";
      if (n.includes("hook_spawner_supply") || n.includes("supply3hole")) return "supplyspawner";
      if (n.includes("hook_store_sentinel")) return "sentinelstore";
      // Cover: explicit hook_bldg_ prefixes only — no bare "cover" catch-all
      if (n.includes("hook_bldg_warthogcover") || n.includes("hook_bldg_pelicanmediumcover") ||
          n.includes("hook_bldg_pelican") || n.includes("hook_bldg_civbus") ||
          n.includes("hook_bldg_cover")) return "cover";
      if (n.includes("bridge") || e.includes("bridge")) return "bridge";
      if (n.includes("sys_marker_crate") || n.includes("rsrc_supplies_crate")) return "supplycrate";
      if (n.includes("sys_creepreward") || n.includes("sys_creepdifficulty")) return "creepconfig";
      if (n.includes("sys_creepworld")) return "creepworld";
      // Forerunner — check before generic creep checks
      if (n.includes("sys_forerunnermarker") || n.includes("sys_forerunner")) return "forerunnermarker";
      if (n.includes("creep_forerunner_base")) return "creepbase";
      // Rebel
      if (n.includes("sys_rebelmarker") || (n.includes("creep_rebel") && !n.includes("base"))) return "rebelmarker";
      if (n.includes("creep_rebel_base") || n.includes("creep_rebel_arcadia")) return "creepbase";
      // Flood
      if (n.includes("sys_floodmarker") || n.includes("hook_spawner_floodrelease")) return "floodmarker";
      if (n.includes("creep_flood_base")) return "creepbase";
      // Player starts
      if (n.includes("playerstart") || n.includes("player_start")) return "playerstart";
      // Units
      if (n.includes("squad") || n.includes("_inf_") || n.includes("_veh_") || n.includes("_air_")) return "unit";
      return "default";
    }

    // ── Parsers ───────────────────────────────────────────────────────────────────
    function parsePos(str) {
      if (!str) return null;
      const parts = str.split(",").map(parseFloat);
      if (parts.length < 3 || parts.some(isNaN)) return null;
      return { x: parts[0], y: parts[1], z: parts[2] };
    }

    // Get only direct text content of element, not nested child text
    function directText(el) {
      let text = "";
      el.childNodes.forEach(n => { if (n.nodeType === 3) text += n.nodeValue; });
      return text.trim();
    }

    function parseSCN(xmlText) {
      const parser = new DOMParser();
      const doc    = parser.parseFromString(xmlText, "text/xml");
      const pe     = doc.querySelector("parsererror");
      if (pe) throw new Error("Invalid XML: " + pe.textContent.slice(0, 100));

      const objects = [];
      const boundsX = 1280, boundsZ = 1280;
      // worldOrigin: offset of world (0,0) in canvas space — updated when XTD loads
      // Stored on scnMeta so all rendering uses the same mapping.
      // Default: origin at (0,0), full canvas = 0→1280 world units.

      doc.querySelectorAll("Object").forEach((el) => {
        const pos = parsePos(el.getAttribute("Position")); if (!pos) return;
        const editorName = el.getAttribute("EditorName") || "";
        const typeName   = directText(el);
        const fwd        = parsePos(el.getAttribute("Forward") || "0,0,1") || { x: 0, y: 0, z: 1 };
        objects.push({
          id: objects.length, name: editorName || typeName || "Object",
          type: typeName, player: el.getAttribute("Player") || "0",
          x: pos.x, y: pos.y, z: pos.z,
          fwdX: fwd.x, fwdZ: fwd.z,
          kind: classifyObject(editorName, typeName),
          raw: el.outerHTML.slice(0, 1200), _el: el,
        });
      });

      doc.querySelectorAll("Squad").forEach((el) => {
        const pos = parsePos(el.getAttribute("Position")); if (!pos) return;
        const editorName = el.getAttribute("EditorName") || el.getAttribute("Name") || "Squad";
        const typeName   = directText(el);
        objects.push({
          id: objects.length, name: editorName,
          type: typeName || "squad", player: el.getAttribute("Player") || "0",
          x: pos.x, y: pos.y, z: pos.z,
          kind: classifyObject(editorName, typeName),
          raw: el.outerHTML.slice(0, 1200), _el: el,
        });
      });

      // Track how many positions we've seen per Number to assign A/B suffix for symmetric pairs
      const slotCount = {};
      const slotLetters = "ABCDEF";
      doc.querySelectorAll("Positions > Position").forEach((el) => {
        const pos = parsePos(el.getAttribute("Position")); if (!pos) return;
        const player = el.getAttribute("Player") || "0";
        const number = el.getAttribute("Number") || "0";
        const playerInt = parseInt(player);

        let name;
        if (playerInt === -1) {
          // Generic team slot — may have symmetric A/B variants
          const key = `slot_${number}`;
          slotCount[key] = (slotCount[key] || 0) + 1;
          const letter = slotLetters[slotCount[key] - 1] || String(slotCount[key]);
          name = `Start Slot ${number}-${letter}`;
        } else if (playerInt > 4) {
          // Player numbers > 4 on a 4-player map are typically camera/observer positions
          name = `Observer/Camera #${number}`;
        } else {
          name = `Player ${player} Start #${number}`;
        }

        const fwd = parsePos(el.getAttribute("Forward") || "0,0,1") || { x: 0, y: 0, z: 1 };
        objects.push({
          id: objects.length, name,
          type: "playerstart", player,
          x: pos.x, y: pos.y, z: pos.z, kind: "playerstart",
          fwdX: fwd.x, fwdZ: fwd.z,
          raw: el.outerHTML.slice(0, 500), _el: el,
        });
      });

      doc.querySelectorAll("Sphere").forEach((el) => {
        const pos = parsePos(el.getAttribute("Position")); if (!pos) return;
        const name   = el.getAttribute("EditorName") || el.getAttribute("Name") || "DesignSphere";
        const typeEl = el.querySelector("Type");
        const type   = typeEl ? typeEl.textContent.trim() : "sphere";
        const radius = parseFloat(el.getAttribute("Radius") || "65");
        objects.push({
          id: objects.length, name, type, player: "",
          x: pos.x, y: pos.y, z: pos.z,
          radius, kind: "designsphere",
          raw: el.outerHTML.slice(0, 500), _el: el,
        });
      });

      return { objects, boundsX, boundsZ, doc };
    }

    // ── Y interpolation (nearest-neighbour, inverse-distance weighted) ────────────
    function interpolateY(newX, newZ, objects, n = 6) {
      // Prefer heightmap if XTD is loaded — exact terrain sample
      const htY = sampleTerrainHeight(newX, newZ);
      if (htY !== null) return htY;
      // Fallback: inverse-distance-weighted average from nearby existing objects
      const candidates = objects
        .filter(o => typeof o.y === "number" && isFinite(o.y) && o.y !== 0)
        .map(o => ({ y: o.y, dist: Math.sqrt((o.x - newX) ** 2 + (o.z - newZ) ** 2) }))
        .sort((a, b) => a.dist - b.dist)
        .slice(0, n);
      if (!candidates.length) return 0;
      if (candidates[0].dist < 0.5) return candidates[0].y;
      const totalW = candidates.reduce((s, c) => s + 1 / c.dist, 0);
      return candidates.reduce((s, c) => s + c.y / c.dist, 0) / totalW;
    }
